<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猫头鹰与狐狸 - 版本选择</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background: #1a1a2e;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: #eee; text-align: center; padding: 20px;
        }
        .container {
            background: #2a2a3a; border-radius: 16px;
            padding: 30px 24px; max-width: 400px; width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        h1 { font-size: 1.4em; margin-bottom: 10px; }
        .notice {
            font-size: 0.85em; color: #ccc; margin-bottom: 24px;
            line-height: 1.6; background: rgba(255,255,255,0.05);
            padding: 12px; border-radius: 8px;
        }
        .btn-group { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .btn {
            display: inline-block; padding: 10px 28px;
            border-radius: 6px; font-weight: bold; font-size: 0.9em;
            text-decoration: none; transition: background 0.2s;
            letter-spacing: 0.04em;
        }
        .btn-new { background: #5b8def; color: #fff; }
        .btn-new:hover { background: #4a7adf; }
        .btn-old { background: #555; color: #ccc; }
        .btn-old:hover { background: #666; }
        @keyframes popIn {
            from { transform: scale(0.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦉 茅童抓狐狸 🦊</h1>
        <div class="notice">
            ⚡ 新版本已发布！<br>
            全新玩家昵称系统、优化对战平衡、更流畅的操作体验。
        </div>
        <div class="btn-group">
            <a href="v2.html" class="btn btn-new">✨ 新版</a>
            <a href="games.html" class="btn btn-old">📦 旧版</a>
        </div>
    </div>
</body>
</html>
