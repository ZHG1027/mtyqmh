<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>猫头鹰与狐狸 · 枪战追逐</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        canvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 8px 14px; color: #fff; font-weight: bold; font-size: 0.9em; background: rgba(0,0,0,0.5); pointer-events: auto; }
        .players { display: flex; gap: 15px; }
        .player-badge { display: flex; align-items: center; gap: 5px; background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 6px; cursor: pointer; }
        .player-badge.p1 { border-bottom: 3px solid #5b8def; }
        .player-badge.p2 { border-bottom: 3px solid #f06b6b; }
        .timer-section { display: flex; align-items: center; gap: 8px; }
        .timer-bar-bg { width: 100px; height: 6px; background: rgba(255,255,255,0.3); border-radius: 6px; overflow: hidden; }
        .timer-bar-fill { width: 100%; height: 100%; background: #6fcf97; border-radius: 6px; transition: width 0.1s linear, background 0.2s; }
        .timer-bar-fill.warning { background: #f2c94c; }
        .timer-bar-fill.danger { background: #eb5757; }
        .timer-seconds { font-size: 1em; min-width: 40px; text-align: right; }
        .bottom-controls { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; align-items: center; color: #ccc; font-size: 0.8em; background: rgba(0,0,0,0.5); padding: 6px 16px; border-radius: 20px; pointer-events: auto; white-space: nowrap; }
        .btn { background: #5b8def; border: none; color: white; font-weight: bold; font-size: 0.9em; padding: 6px 18px; border-radius: 4px; cursor: pointer; transition: background 0.2s; letter-spacing: 0.04em; }
        .btn:hover { background: #4a7adf; }
        .btn:active { background: #3a6acf; }
        .hidden { display: none !important; }
        .settings-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; pointer-events: auto; }
        .settings-panel { background: #2a2a3a; border-radius: 12px; padding: 20px; width: 400px; max-width: 90vw; color: #eee; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .settings-tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .settings-tab { flex: 1; padding: 8px; text-align: center; background: #3a3a4a; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .settings-tab.active { background: #5b8def; }
        .binding-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; background: rgba(255,255,255,0.05); padding: 6px 10px; border-radius: 4px; }
        .binding-label { font-size: 0.9em; }
        .binding-key { background: #4a4a5a; padding: 4px 12px; border-radius: 4px; font-weight: bold; min-width: 80px; text-align: center; cursor: pointer; transition: background 0.2s; }
        .binding-key:hover { background: #5a5a6a; }
        .binding-key.listening { background: #f0a040; animation: pulse 0.8s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .settings-actions { display: flex; justify-content: space-between; margin-top: 15px; }
        .btn-small { background: #5b8def; border: none; color: white; font-weight: bold; font-size: 0.8em; padding: 5px 12px; border-radius: 4px; cursor: pointer; }
        .btn-small.reset { background: #e74c3c; }
        .btn-small.close { background: #666; }
        .hp-bars { position: absolute; bottom: 70px; left: 0; right: 0; display: flex; justify-content: space-between; padding: 0 30px; pointer-events: none; z-index: 5; }
        .hp-bar-wrap { display: flex; align-items: center; width: 45%; gap: 8px; }
        .hp-label { font-size: 0.8em; font-weight: bold; color: #ccc; min-width: 40px; text-align: center; }
        .hp-bar { flex: 1; height: 10px; background: #333; border-radius: 5px; overflow: hidden; }
        .hp-fill { height: 100%; width: 100%; border-radius: 5px; transition: width 0.2s ease, background 0.2s; }
        .p1-fill { background: #5b8def; }
        .p2-fill { background: #f06b6b; }
        .nickname-input { background: #3a3a4a; border: 1px solid #555; color: #fff; padding: 5px 10px; border-radius: 4px; margin: 5px 0; width: 100%; }
        .nickname-row { display: flex; align-items: center; gap: 10px; margin: 8px 0; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div class="ui-layer">
        <div class="top-bar">
            <div class="players">
                <div class="player-badge p1" id="badgeP1">
                    <span id="p1NameDisplay">玩家1</span>
                    <span id="emojiP1">🦉</span>
                    <span style="font-size:0.8em;" id="p1Keys">WASD/F</span>
                </div>
                <div class="player-badge p2" id="badgeP2">
                    <span id="p2NameDisplay">玩家2</span>
                    <span id="emojiP2">🦊</span>
                    <span style="font-size:0.8em;" id="p2Keys">↑↓←→/</span>
                </div>
            </div>
            <div class="timer-section">
                <div class="timer-bar-bg"><div class="timer-bar-fill" id="timerFill" style="width:100%"></div></div>
                <span class="timer-seconds" id="timerDisplay">10.0</span>
            </div>
        </div>
        <div class="bottom-controls">
            <button class="btn" id="startBtn">▶ 开始游戏</button>
            <button class="btn" id="settingsBtn">⚙️ 设置</button>
            <button class="btn" id="editNameBtn">✏️ 昵称</button>
            <span id="controlsHint">🔄10秒互换 空格开始</span>
        </div>
        <div class="hp-bars">
            <div class="hp-bar-wrap">
                <span class="hp-label" id="p1HPLabel" style="color:#5b8def;">玩家1</span>
                <div class="hp-bar"><div class="hp-fill p1-fill" id="p1HPFill"></div></div>
            </div>
            <div class="hp-bar-wrap">
                <span class="hp-label" id="p2HPLabel" style="color:#f06b6b;">玩家2</span>
                <div class="hp-bar"><div class="hp-fill p2-fill" id="p2HPFill"></div></div>
            </div>
        </div>
    </div>

    <div class="settings-overlay hidden" id="settingsOverlay">
        <div class="settings-panel">
            <div class="settings-tabs">
                <div class="settings-tab active" id="tabP1">玩家1 (WASD)</div>
                <div class="settings-tab" id="tabP2">玩家2 (方向键)</div>
            </div>
            <div id="bindingsContainer"></div>
            <div class="settings-actions">
                <button class="btn-small reset" id="resetBindings">重置默认</button>
                <button class="btn-small close" id="closeSettings">关闭</button>
            </div>
        </div>
    </div>

    <div class="settings-overlay hidden" id="nameOverlay">
        <div class="settings-panel">
            <h3 style="margin-bottom:12px;">自定义玩家昵称</h3>
            <div class="nickname-row">
                <span>玩家1：</span>
                <input type="text" class="nickname-input" id="nameInput1" placeholder="玩家1" maxlength="8">
            </div>
            <div class="nickname-row">
                <span>玩家2：</span>
                <input type="text" class="nickname-input" id="nameInput2" placeholder="玩家2" maxlength="8">
            </div>
            <div class="settings-actions" style="margin-top:15px;">
                <button class="btn-small reset" id="resetNames">默认</button>
                <button class="btn-small close" id="saveNames">保存</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const startBtn = document.getElementById('startBtn');
            const settingsBtn = document.getElementById('settingsBtn');
            const editNameBtn = document.getElementById('editNameBtn');
            const timerFill = document.getElementById('timerFill');
            const timerDisplay = document.getElementById('timerDisplay');
            const emojiP1 = document.getElementById('emojiP1');
            const emojiP2 = document.getElementById('emojiP2');
            const p1KeysDisplay = document.getElementById('p1Keys');
            const p2KeysDisplay = document.getElementById('p2Keys');
            const controlsHint = document.getElementById('controlsHint');

            const p1NameDisplay = document.getElementById('p1NameDisplay');
            const p2NameDisplay = document.getElementById('p2NameDisplay');
            const p1HPLabel = document.getElementById('p1HPLabel');
            const p2HPLabel = document.getElementById('p2HPLabel');
            const nameOverlay = document.getElementById('nameOverlay');
            const nameInput1 = document.getElementById('nameInput1');
            const nameInput2 = document.getElementById('nameInput2');
            const saveNamesBtn = document.getElementById('saveNames');
            const resetNamesBtn = document.getElementById('resetNames');

            let playerNames = { p1: '玩家1', p2: '玩家2' };
            try { const saved = localStorage.getItem('owlFoxNames'); if (saved) { const parsed = JSON.parse(saved); if (parsed && parsed.p1 && parsed.p2) playerNames = parsed; } } catch(e) {}
            function updateNameDisplays() { p1NameDisplay.textContent = playerNames.p1; p2NameDisplay.textContent = playerNames.p2; p1HPLabel.textContent = playerNames.p1; p2HPLabel.textContent = playerNames.p2; }
            updateNameDisplays();
            nameInput1.value = playerNames.p1; nameInput2.value = playerNames.p2;

            editNameBtn.addEventListener('click', () => { nameOverlay.classList.remove('hidden'); nameInput1.value = playerNames.p1; nameInput2.value = playerNames.p2; });
            saveNamesBtn.addEventListener('click', () => { playerNames.p1 = nameInput1.value.trim() || '玩家1'; playerNames.p2 = nameInput2.value.trim() || '玩家2'; try { localStorage.setItem('owlFoxNames', JSON.stringify(playerNames)); } catch(e) {} updateNameDisplays(); nameOverlay.classList.add('hidden'); });
            resetNamesBtn.addEventListener('click', () => { playerNames = { p1: '玩家1', p2: '玩家2' }; try { localStorage.setItem('owlFoxNames', JSON.stringify(playerNames)); } catch(e) {} updateNameDisplays(); nameInput1.value = playerNames.p1; nameInput2.value = playerNames.p2; });
            nameOverlay.addEventListener('click', (e) => { if (e.target === nameOverlay) nameOverlay.classList.add('hidden'); });

            const WORLD_W = 900, WORLD_H = 600;
            const PLAYER_SPEED = 230;
            const PLAYER_RADIUS = 14;
            const SWAP_INTERVAL = 10;
            const BULLET_SPEED = 700;
            const BOMB_SPEED = 300;
            const BOMB_TIMER = 2.0;
            const EXPLOSION_RADIUS = 75;
            const EXPLOSION_CENTER_RADIUS = 28;
            const DAMAGE_BULLET = 2;
            const DAMAGE_BOMB_NORMAL = 2;
            const DAMAGE_BOMB_CENTER = 5;
            const CRATE_RADIUS = 12;
            const EXPLOSION_DISPLAY_TIME = 0.5;
            const BOMB_GRACE_PERIOD = 0.12;
            const FIRE_COOLDOWN = 100;
            const CRATE_RESPAWN_COUNT = 5;
            const WEAPON_OFFSET_DISTANCE = 26;

            const defaultBindings = {
                p1: { up: 'KeyW', down: 'KeyS', left: 'KeyA', right: 'KeyD', fire: 'KeyF' },
                p2: { up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight', fire: 'Slash' }
            };
            let bindings = JSON.parse(JSON.stringify(defaultBindings));
            try { const saved = localStorage.getItem('owlFoxBindings_v7'); if (saved) { const parsed = JSON.parse(saved); if (parsed && parsed.p1 && parsed.p2) bindings = parsed; } } catch (e) {}
            function saveBindings() { try { localStorage.setItem('owlFoxBindings_v7', JSON.stringify(bindings)); } catch (e) {} }
            function getSafeBindings() { return (bindings && bindings.p1 && bindings.p2) ? bindings : defaultBindings; }

            function getAllActionKeys() { const keys = new Set(); const b = getSafeBindings(); try { for (const p of ['p1','p2']) for (const a of ['up','down','left','right','fire']) keys.add(b[p][a]); } catch(e){} keys.add('Space'); return keys; }
            function getKeyDisplay(code) { if (code.startsWith('Key')) return code.slice(3).toUpperCase(); if (code.startsWith('Arrow')) return code.slice(5); if (code === 'Slash') return '/'; return code; }
            function updateKeyDisplays() { const b = getSafeBindings(); p1KeysDisplay.textContent = `${getKeyDisplay(b.p1.up)}${getKeyDisplay(b.p1.down)}${getKeyDisplay(b.p1.left)}${getKeyDisplay(b.p1.right)}/${getKeyDisplay(b.p1.fire)}`; p2KeysDisplay.textContent = `${getKeyDisplay(b.p2.up)}${getKeyDisplay(b.p2.down)}${getKeyDisplay(b.p2.left)}${getKeyDisplay(b.p2.right)}/${getKeyDisplay(b.p2.fire)}`; }
            updateKeyDisplays();

            const settingsOverlay = document.getElementById('settingsOverlay');
            const tabP1 = document.getElementById('tabP1'); const tabP2 = document.getElementById('tabP2');
            const bindingsContainer = document.getElementById('bindingsContainer');
            let currentTab = 'p1'; let listeningAction = null;

            function renderBindings() { const b = getSafeBindings()[currentTab]; const actions = [{ key:'up',label:'上'},{ key:'down',label:'下'},{ key:'left',label:'左'},{ key:'right',label:'右'},{ key:'fire',label:'开火' }]; bindingsContainer.innerHTML = actions.map(a => `<div class="binding-row"><span class="binding-label">${a.label}</span><span class="binding-key" data-action="${a.key}">${getKeyDisplay(b[a.key])}</span></div>`).join(''); document.querySelectorAll('.binding-key').forEach(el => { el.addEventListener('click', () => { if (listeningAction) return; startListening(el.dataset.action, el); }); }); }
            function startListening(action, element) { if (listeningAction) return; element.classList.add('listening'); element.textContent = '...'; const handler = (e) => { e.preventDefault(); e.stopImmediatePropagation(); const code = e.code; const b = getSafeBindings(); for (const p of ['p1','p2']) for (const a of ['up','down','left','right','fire']) if (b[p][a] === code && !(p===currentTab && a===action)) { alert('该按键已被绑定'); stopListening(); renderBindings(); return; } bindings[currentTab][action] = code; saveBindings(); updateKeyDisplays(); stopListening(); renderBindings(); }; listeningAction = { action, element, handler }; window.addEventListener('keydown', handler); }
            function stopListening() { if (listeningAction) { window.removeEventListener('keydown', listeningAction.handler); listeningAction.element.classList.remove('listening'); listeningAction = null; } }

            settingsBtn.addEventListener('click', () => { settingsOverlay.classList.remove('hidden'); currentTab='p1'; tabP1.classList.add('active'); tabP2.classList.remove('active'); renderBindings(); });
            tabP1.addEventListener('click', () => { stopListening(); currentTab='p1'; tabP1.classList.add('active'); tabP2.classList.remove('active'); renderBindings(); });
            tabP2.addEventListener('click', () => { stopListening(); currentTab='p2'; tabP2.classList.add('active'); tabP1.classList.remove('active'); renderBindings(); });
            document.getElementById('closeSettings').addEventListener('click', () => { stopListening(); settingsOverlay.classList.add('hidden'); });
            document.getElementById('resetBindings').addEventListener('click', () => { bindings = JSON.parse(JSON.stringify(defaultBindings)); saveBindings(); updateKeyDisplays(); stopListening(); renderBindings(); });
            settingsOverlay.addEventListener('click', (e) => { if (e.target === settingsOverlay) { stopListening(); settingsOverlay.classList.add('hidden'); } });

            // 游戏状态
            let owl, fox, owlController, swapTimer, gameActive, gameOver, winnerMessage, swapFlash;
            let bullets, bombs, crates, innerLines, explosions;
            let player1HP, player2HP;
            let lastOwlDir, lastFoxDir;
            const keys = new Set();
            let lastTimestamp = 0, animationId = null;
            let p1LastFireTime = 0, p2LastFireTime = 0;

            const borderLines = [{ x1:0,y1:0,x2:WORLD_W,y2:0 },{ x1:WORLD_W,y1:0,x2:WORLD_W,y2:WORLD_H },{ x1:WORLD_W,y1:WORLD_H,x2:0,y2:WORLD_H },{ x1:0,y1:WORLD_H,x2:0,y2:0 }];

            function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            window.addEventListener('resize', resizeCanvas); resizeCanvas();

            function getPlayerRole(p) { return owlController === p ? 'owl' : 'fox'; }
            function getRoleObj(r) { return r==='owl'?owl:fox; }
            function getAllLines() { return [...borderLines, ...innerLines]; }
            function getRoleController(role) { return role==='owl' ? owlController : (owlController==='player1'?'player2':'player1'); }

            function distToSegment(px,py,x1,y1,x2,y2) { const dx=x2-x1,dy=y2-y1; const lenSq=dx*dx+dy*dy; if(lenSq===0) return Math.hypot(px-x1,py-y1); let t=((px-x1)*dx+(py-y1)*dy)/lenSq; t=Math.max(0,Math.min(1,t)); return Math.hypot(px-(x1+t*dx),py-(y1+t*dy)); }
            function circleHitsLines(cx,cy,r,lines) { for(const l of lines) if(distToSegment(cx,cy,l.x1,l.y1,l.x2,l.y2)<r) return true; return false; }
            function moveCircle(cx,cy,dx,dy,r,lines) { let nx=cx+dx,ny=cy+dy; if(circleHitsLines(nx,cy,r,lines)) nx=cx; if(circleHitsLines(cx,ny,r,lines)) ny=cy; return {x:nx,y:ny}; }
            function circlesOverlap(x1,y1,r1,x2,y2,r2) { return Math.hypot(x2-x1,y2-y1)<(r1+r2); }

            function generateRandomLines() { const lines=[]; const count=12+Math.floor(Math.random()*8); for(let i=0;i<count*3&&lines.length<count;i++) { const h=Math.random()<0.5; let x1,y1,x2,y2; if(h) { y1=60+Math.random()*(WORLD_H-120); x1=60+Math.random()*(WORLD_W-240); x2=x1+60+Math.random()*180; y2=y1; } else { x1=60+Math.random()*(WORLD_W-120); y1=60+Math.random()*(WORLD_H-240); y2=y1+60+Math.random()*180; x2=x1; } if(Math.hypot(x1-150,y1-120)<80||Math.hypot(x1-750,y1-480)<80) continue; lines.push({x1,y1,x2,y2}); } return lines; }

            function spawnCrates(count=5) {
                const arr=[], allLines=getAllLines();
                const types = ['pistol', 'bomb', 'machinegun'];
                while(types.length < count) types.push(['pistol','bomb','machinegun'][Math.floor(Math.random()*3)]);
                for(let i=types.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [types[i],types[j]]=[types[j],types[i]]; }
                for(let i=0;i<count*15&&arr.length<count;i++) {
                    const x=50+Math.random()*(WORLD_W-100), y=50+Math.random()*(WORLD_H-100);
                    if(circleHitsLines(x,y,CRATE_RADIUS+6,allLines)) continue;
                    if(Math.hypot(x-owl.x,y-owl.y)<90||Math.hypot(x-fox.x,y-fox.y)<90) continue;
                    arr.push({x,y,type:types[arr.length]});
                }
                while(arr.length<count) arr.push({x:50+Math.random()*(WORLD_W-100),y:50+Math.random()*(WORLD_H-100),type:types[arr.length]});
                return arr;
            }

            function fireWeapon(role, player) {
                const obj=getRoleObj(role); if(!obj||!obj.weapon||obj.weapon.ammo<=0) return;
                const b=getSafeBindings()[player==='player1'?'p1':'p2']; if(!b) return;
                let dx=0,dy=0;
                if(keys.has(b.up)) dy-=1; if(keys.has(b.down)) dy+=1;
                if(keys.has(b.left)) dx-=1; if(keys.has(b.right)) dx+=1;
                let dir; if(dx!==0||dy!==0) { const len=Math.hypot(dx,dy); dir={dx:dx/len,dy:dy/len}; } else dir=(role==='owl'?lastOwlDir:lastFoxDir);
                const len=Math.hypot(dir.dx,dir.dy); if(len===0) return;
                const norm={dx:dir.dx/len,dy:dir.dy/len};
                if(obj.weapon.type==='pistol'||obj.weapon.type==='machinegun') {
                    bullets.push({x:obj.x,y:obj.y,vx:norm.dx*BULLET_SPEED,vy:norm.dy*BULLET_SPEED,owner:player,role});
                } else if(obj.weapon.type==='bomb') {
                    const off=PLAYER_RADIUS+8;
                    bombs.push({x:obj.x+norm.dx*off,y:obj.y+norm.dy*off,vx:norm.dx*BOMB_SPEED,vy:norm.dy*BOMB_SPEED,timer:BOMB_TIMER,owner:player,role,grace:BOMB_GRACE_PERIOD});
                }
                obj.weapon.ammo--; if(obj.weapon.ammo<=0) obj.weapon=null;
            }

            function applyDamage(targetRole, amount, attackerPlayer) {
                const targetController=getRoleController(targetRole);
                if(targetController==='player1') { player1HP-=amount; if(player1HP<0) player1HP=0; }
                else { player2HP-=amount; if(player2HP<0) player2HP=0; }
                updatePlayerHPUI();
                if(player1HP<=0||player2HP<=0) {
                    gameOver=true; gameActive=false;
                    const loser=player1HP<=0?playerNames.p1:playerNames.p2;
                    const winner=loser===playerNames.p1?playerNames.p2:playerNames.p1;
                    winnerMessage=`💀 ${winner} 获胜！`;
                    startBtn.textContent='↻ 重新开始'; startBtn.classList.remove('hidden'); controlsHint.classList.add('hidden');
                }
            }

            function explodeBomb(bomb) {
                explosions.push({x:bomb.x,y:bomb.y,radius:0,maxRadius:EXPLOSION_RADIUS,timer:EXPLOSION_DISPLAY_TIME});
                for(const t of [{role:'owl',obj:owl},{role:'fox',obj:fox}]) {
                    const dist=Math.hypot(t.obj.x-bomb.x,t.obj.y-bomb.y);
                    if(dist<EXPLOSION_RADIUS) {
                        const damage=dist<EXPLOSION_CENTER_RADIUS?DAMAGE_BOMB_CENTER:DAMAGE_BOMB_NORMAL;
                        applyDamage(t.role, damage, bomb.owner);
                        if(gameOver) break;
                    }
                }
            }

            function updatePlayerHPUI() {
                document.getElementById('p1HPFill').style.width = player1HP+'%';
                document.getElementById('p2HPFill').style.width = player2HP+'%';
            }

            function update(dt) {
                if(!gameActive||gameOver) return;
                const dtC=Math.min(dt,0.05);
                const now = performance.now();

                const safeB = getSafeBindings();
                if (keys.has(safeB.p1.fire) && gameActive && !gameOver) {
                    if (now - p1LastFireTime >= FIRE_COOLDOWN) {
                        fireWeapon(getPlayerRole('player1'), 'player1');
                        p1LastFireTime = now;
                    }
                }
                if (keys.has(safeB.p2.fire) && gameActive && !gameOver) {
                    if (now - p2LastFireTime >= FIRE_COOLDOWN) {
                        fireWeapon(getPlayerRole('player2'), 'player2');
                        p2LastFireTime = now;
                    }
                }

                for(let i=explosions.length-1;i>=0;i--) { explosions[i].timer-=dtC; explosions[i].radius=(1-explosions[i].timer/EXPLOSION_DISPLAY_TIME)*explosions[i].maxRadius; if(explosions[i].timer<=0) explosions.splice(i,1); }
                swapTimer-=dtC; if(swapTimer<=0) { owlController=owlController==='player1'?'player2':'player1'; swapTimer+=SWAP_INTERVAL; swapFlash=1.2; updateUI(); }
                if(swapFlash>0) swapFlash=Math.max(0,swapFlash-dtC);
                const allLines=getAllLines(), moveDist=PLAYER_SPEED*dtC;
                function movePlayer(player) {
                    const b=getSafeBindings()[player==='player1'?'p1':'p2']; if(!b) return;
                    const role=getPlayerRole(player), obj=getRoleObj(role); if(!obj) return;
                    let dx=0,dy=0; if(keys.has(b.up)) dy-=1; if(keys.has(b.down)) dy+=1; if(keys.has(b.left)) dx-=1; if(keys.has(b.right)) dx+=1;
                    if(dx!==0||dy!==0) { const len=Math.hypot(dx,dy); const dir={dx:dx/len,dy:dy/len}; const res=moveCircle(obj.x,obj.y,dir.dx*moveDist,dir.dy*moveDist,PLAYER_RADIUS,allLines); obj.x=res.x; obj.y=res.y; if(role==='owl') lastOwlDir=dir; else lastFoxDir=dir; }
                }
                movePlayer('player1'); movePlayer('player2');
                if(circlesOverlap(owl.x,owl.y,PLAYER_RADIUS,fox.x,fox.y,PLAYER_RADIUS)) {
                    gameOver=true; gameActive=false;
                    const foxController=getRoleController('fox'), winner=foxController==='player1'?playerNames.p2:playerNames.p1;
                    winnerMessage=`🦊 ${playerNames[foxController]} 的狐狸被撞，${winner} 获胜！`;
                    startBtn.textContent='↻ 重新开始'; startBtn.classList.remove('hidden'); controlsHint.classList.add('hidden'); return;
                }
                for(let i=bullets.length-1;i>=0;i--) { const b=bullets[i]; b.x+=b.vx*dtC; b.y+=b.vy*dtC; if(b.x<5||b.x>WORLD_W-5||b.y<5||b.y>WORLD_H-5||circleHitsLines(b.x,b.y,4,allLines)) { bullets.splice(i,1); continue; } const otherRole=b.role==='owl'?'fox':'owl', otherObj=getRoleObj(otherRole); if(circlesOverlap(b.x,b.y,4,otherObj.x,otherObj.y,PLAYER_RADIUS)) { applyDamage(otherRole, DAMAGE_BULLET, b.owner); bullets.splice(i,1); if(gameOver) return; } }
                for(let i=bombs.length-1;i>=0;i--) { const b=bombs[i]; b.x+=b.vx*dtC; b.y+=b.vy*dtC; b.timer-=dtC; if(b.grace>0) b.grace-=dtC; let explode=false; if(circleHitsLines(b.x,b.y,5,allLines)) explode=true; else if(b.x<6||b.x>WORLD_W-6||b.y<6||b.y>WORLD_H-6) explode=true; else if(b.timer<=0) explode=true; else if(b.grace<=0) { const enemyRole=b.role==='owl'?'fox':'owl', enemyObj=getRoleObj(enemyRole); if(circlesOverlap(b.x,b.y,6,enemyObj.x,enemyObj.y,PLAYER_RADIUS)) explode=true; } if(explode) { bombs.splice(i,1); explodeBomb(b); if(gameOver) return; } }
                for(let i=crates.length-1;i>=0;i--) {
                    const c=crates[i];
                    if(circlesOverlap(c.x,c.y,CRATE_RADIUS,owl.x,owl.y,PLAYER_RADIUS)) {
                        if(!owl.weapon) {
                            const maxAmmo = c.type==='pistol'?5: (c.type==='bomb'?2:50);
                            owl.weapon = { type: c.type, ammo: maxAmmo, maxAmmo: maxAmmo };
                            crates.splice(i,1);
                        }
                    } else if(circlesOverlap(c.x,c.y,CRATE_RADIUS,fox.x,fox.y,PLAYER_RADIUS)) {
                        if(!fox.weapon) {
                            const maxAmmo = c.type==='pistol'?5: (c.type==='bomb'?2:50);
                            fox.weapon = { type: c.type, ammo: maxAmmo, maxAmmo: maxAmmo };
                            crates.splice(i,1);
                        }
                    }
                }
                if (crates.length === 0) { const newCrates = spawnCrates(CRATE_RESPAWN_COUNT); for (const nc of newCrates) crates.push(nc); }
                updateTimerUI();
            }

            function draw() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                const scale=Math.min(canvas.width/WORLD_W,canvas.height/WORLD_H);
                const ox=(canvas.width-WORLD_W*scale)/2, oy=(canvas.height-WORLD_H*scale)/2;
                ctx.save(); ctx.translate(ox,oy); ctx.scale(scale,scale);
                ctx.fillStyle='#faf8f0'; ctx.fillRect(0,0,WORLD_W,WORLD_H);
                ctx.strokeStyle='#444'; ctx.lineWidth=2.5; ctx.lineCap='round';
                for(const l of getAllLines()) { ctx.beginPath(); ctx.moveTo(l.x1,l.y1); ctx.lineTo(l.x2,l.y2); ctx.stroke(); }
                for(const c of crates) {
                    ctx.fillStyle='#8B5A2B';
                    ctx.fillRect(c.x-10, c.y-10, 20, 20);
                    ctx.strokeStyle='#5a3a1a';
                    ctx.strokeRect(c.x-10, c.y-10, 20, 20);
                    ctx.fillStyle='#fff';
                    ctx.font='16px "Segoe UI Emoji"';
                    ctx.textAlign='center'; ctx.textBaseline='middle';
                    ctx.fillText('📦', c.x, c.y);
                }
                for(const exp of explosions) { const a=exp.timer/EXPLOSION_DISPLAY_TIME; ctx.strokeStyle=`rgba(255,80,30,${a*0.9})`; ctx.lineWidth=4*a; ctx.beginPath(); ctx.arc(exp.x,exp.y,exp.radius,0,Math.PI*2); ctx.stroke(); ctx.fillStyle=`rgba(255,200,0,${a*0.8})`; ctx.beginPath(); ctx.arc(exp.x,exp.y,exp.radius*0.3,0,Math.PI*2); ctx.fill(); }
                ctx.fillStyle='#222'; for(const b of bullets) { ctx.beginPath(); ctx.arc(b.x,b.y,3.5,0,Math.PI*2); ctx.fill(); }
                for(const b of bombs) { ctx.fillStyle='#d44'; ctx.beginPath(); ctx.arc(b.x,b.y,6,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#fff'; ctx.font='9px sans-serif'; ctx.fillText('💣',b.x,b.y-1); }
                ctx.font='34px "Segoe UI Emoji","Apple Color Emoji","Noto Color Emoji"'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillStyle='#222';
                ctx.fillText('🦉',owl.x,owl.y); ctx.fillText('🦊',fox.x,fox.y);

                function drawWeapon(obj, dir) {
                    if(!obj||!obj.weapon) return;
                    const icon = obj.weapon.type==='pistol'?'🔫': (obj.weapon.type==='bomb'?'💣':'🔫');
                    const d = dir || {dx:1, dy:0};
                    const angle = Math.atan2(d.dy, d.dx);
                    const correctedAngle = angle + Math.PI;
                    const wx = obj.x + Math.cos(angle) * WEAPON_OFFSET_DISTANCE;
                    const wy = obj.y + Math.sin(angle) * WEAPON_OFFSET_DISTANCE;
                    ctx.save();
                    ctx.translate(wx, wy);
                    ctx.rotate(correctedAngle);
                    ctx.font = '18px "Segoe UI Emoji"';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(icon, 0, 0);
                    ctx.restore();
                }

                function drawAmmoInfo(obj) {
                    if (!obj || !obj.weapon) return;
                    const max = obj.weapon.maxAmmo || 5;
                    const ammo = obj.weapon.ammo;
                    const text = `${ammo}/${max}`;
                    const textY = obj.y - 42;
                    // 绘制背景框
                    ctx.font = 'bold 12px "Segoe UI", sans-serif';
                    const textWidth = ctx.measureText(text).width;
                    ctx.fillStyle = 'rgba(0,0,0,0.6)';
                    ctx.fillRect(obj.x - textWidth/2 - 6, textY - 14, textWidth + 12, 18);
                    // 绘制文本
                    ctx.fillStyle = '#ffd966';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(text, obj.x, textY);
                }

                drawWeapon(owl, lastOwlDir);
                drawWeapon(fox, lastFoxDir);
                drawAmmoInfo(owl);
                drawAmmoInfo(fox);

                if(swapFlash>0&&gameActive) { ctx.fillStyle=`rgba(0,0,0,${Math.min(swapFlash,0.8)})`; ctx.font='bold 24px "Segoe UI","PingFang SC","Microsoft YaHei"'; ctx.fillText('🔄 角色互换！',WORLD_W/2,60); }
                if(gameOver) { ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,WORLD_W,WORLD_H); ctx.fillStyle='#ffd966'; ctx.font='bold 30px "Segoe UI","PingFang SC","Microsoft YaHei"'; ctx.fillText(winnerMessage,WORLD_W/2,WORLD_H/2-20); ctx.fillStyle='#fff'; ctx.font='17px sans-serif'; ctx.fillText('点击按钮或按空格键重新开始',WORLD_W/2,WORLD_H/2+40); }
                ctx.restore();
            }

            function updateUI() { if(owlController==='player1') { emojiP1.textContent='🦉'; emojiP2.textContent='🦊'; } else { emojiP1.textContent='🦊'; emojiP2.textContent='🦉'; } updateTimerUI(); updatePlayerHPUI(); }
            function updateTimerUI() { const remaining=Math.max(0,swapTimer); timerFill.style.width=(remaining/SWAP_INTERVAL*100)+'%'; timerDisplay.textContent=remaining.toFixed(1); timerFill.classList.remove('warning','danger'); if(remaining<=2) timerFill.classList.add('danger'); else if(remaining<=4) timerFill.classList.add('warning'); }

            function resetGame() {
                owl={x:150,y:120,weapon:null}; fox={x:750,y:480,weapon:null}; owlController='player1'; player1HP=100; player2HP=100;
                swapTimer=SWAP_INTERVAL; gameActive=false; gameOver=false; winnerMessage=''; swapFlash=0;
                bullets=[]; bombs=[]; explosions=[]; innerLines=generateRandomLines(); crates=spawnCrates(5);
                lastOwlDir={dx:1,dy:0}; lastFoxDir={dx:-1,dy:0}; keys.clear();
                p1LastFireTime = p2LastFireTime = 0;
                updateUI(); startBtn.textContent='▶ 开始游戏'; startBtn.classList.remove('hidden'); controlsHint.classList.remove('hidden');
            }

            function startGame() { stopListening(); resetGame(); gameActive=true; gameOver=false; startBtn.classList.add('hidden'); controlsHint.classList.add('hidden'); lastTimestamp=performance.now(); if(animationId===null) animationId=requestAnimationFrame(gameLoop); }

            window.addEventListener('keydown', (e) => { if(listeningAction) return; const allKeys=getAllActionKeys(); if(allKeys.has(e.code)) e.preventDefault(); keys.add(e.code); if(e.code==='Space') { if(!gameActive||gameOver) startGame(); return; } });
            window.addEventListener('keyup', (e) => { if(getAllActionKeys().has(e.code)) e.preventDefault(); keys.delete(e.code); });
            startBtn.addEventListener('click', () => { if(!gameActive||gameOver) startGame(); });
            window.addEventListener('blur', () => keys.clear());

            function gameLoop(now) { try { if(!lastTimestamp) lastTimestamp=now; let dt=(now-lastTimestamp)/1000; if(dt>0.1) dt=0.1; if(dt<=0) dt=0.016; if(gameActive&&!gameOver) update(dt); draw(); lastTimestamp=now; animationId=requestAnimationFrame(gameLoop); } catch(err) { console.error('游戏主循环出错：',err); animationId=null; gameActive=false; startBtn.textContent='↻ 重新开始'; startBtn.classList.remove('hidden'); controlsHint.textContent='游戏出错，请刷新页面重试'; controlsHint.classList.remove('hidden'); } }

            resizeCanvas(); resetGame(); lastTimestamp=performance.now(); animationId=requestAnimationFrame(gameLoop);
        })();
    </script>
</body>
